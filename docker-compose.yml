services:
    minio:
        image: minio/minio:latest
        container_name: minio
        # Official image needs this command to start the server and UI
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000" # API port
            - "9001:9001" # Web UI port
        networks:
            - backend
        volumes:
            # Official image stores data in /data
            - "minio_data:/data"
        environment:
            - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
            - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 20s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    # This setup container acts as your "Multiple Projects" bucket creator
    minio-setup:
        image: minio/mc:latest
        container_name: minio-setup
        depends_on:
            minio:
                condition: service_healthy # Waits for MinIO to be fully running
        networks:
            - backend
        entrypoint: >
            /bin/sh -c "
            mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
            mc mb myminio/project-a --ignore-existing;
            mc mb myminio/project-b --ignore-existing;
            exit 0;
            "

networks:
    backend:
        driver: bridge

volumes:
    minio_data:
  